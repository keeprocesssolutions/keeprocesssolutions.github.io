<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Noto+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ProfessionalService",
    "@id": {{ '/#business' | absolute_url | jsonify }},
    "name": {{ site.title | jsonify }},
    "url": {{ '/' | absolute_url | jsonify }},
    "mainEntityOfPage": {{ page.url | absolute_url | jsonify }},
    "logo": {{ site.logo | absolute_url | jsonify }},
    "image": {{ site.image | absolute_url | jsonify }},
    "description": {{ page.description | default: site.description | strip_newlines | jsonify }},
    "founder": {
      "@type": "Person",
      "name": {{ site.author.name | jsonify }}
    },
    "email": {{ site.contact.email | jsonify }},
    "telephone": {{ site.contact.phone_uri | jsonify }},
    "address": {
      "@type": "PostalAddress",
      "addressLocality": {{ site.contact.city | jsonify }},
      "addressRegion": {{ site.contact.region | jsonify }},
      "addressCountry": {{ site.contact.country | jsonify }}
    },
    "areaServed": [
      {
        "@type": "AdministrativeArea",
        "name": "Central Valley, California"
      },
      {
        "@type": "City",
        "name": "Modesto"
      }
    ],
    "serviceType": [
      "Process development consulting",
      "Continuous improvement coaching",
      "Process improvement consulting",
      "Operational workflow consulting"
    ]
  }
  </script>
</head>
<body>

  <header class="site-header">
    <div class="container header-inner">
      <a href="{{ '/' | relative_url }}" class="logo-link">
        <img src="{{ '/assets/images/logo.svg' | relative_url }}" alt="Kee Process Solutions logo" class="logo-img">
      </a>
      <nav class="site-nav">
        <button class="nav-toggle" aria-label="Toggle navigation">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
          <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>Home</a></li>
          <li><a href="{{ '/about/' | relative_url }}"{% if page.url contains 'about' %} class="active"{% endif %}>About</a></li>
          <li><a href="{{ '/contact/' | relative_url }}"{% if page.url contains 'contact' %} class="active"{% endif %}>Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p class="footer-contact">
        Phone: <a href="tel:{{ site.contact.phone_uri }}">{{ site.contact.phone }}</a> |
        Email: <a href="mailto:{{ site.contact.email }}">{{ site.contact.email }}</a>
      </p>
      <p class="footer-copy">&copy; {{ 'now' | date: "%Y" }} Kee Process Solutions</p>
    </div>
  </footer>

  <script>
    const toggle = document.querySelector('.nav-toggle');
    const navLinks = document.querySelector('.nav-links');
    toggle.addEventListener('click', () => {
      navLinks.classList.toggle('open');
      toggle.classList.toggle('open');
    });
  </script>

</body>
</html>
